<section class="card">
    <div class="card-header">
        <div class="card-type"><span class="badge-type" 
            [class.expense]="transaction().type === 'Expense'"
            [class.income]="transaction().type === 'Income'"
            >{{transaction().type.toUpperCase()}}</span>
        </div>
        <div class="card-ellipsis">
            <svg lucideEllipsis size="19px"></svg>
        </div>
    </div>
    <div class="card-main">
        <div class="card-title">{{transaction().title}}</div>
        <div class="card-amount">{{transaction().amount | currency:'BRL'}}</div>
    </div>
    <div class="card-footer">
        <div class="card-date">{{transaction().date | date:'dd/MM/yyyy'}}</div>
        <div class="card-status">{{transaction().status}}</div>
    </div>
</section>
