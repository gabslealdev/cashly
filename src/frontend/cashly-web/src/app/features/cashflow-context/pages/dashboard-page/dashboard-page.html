<main>
  <div class="aside-container">
    <div class="logo-wrapper">
      <img class="logo" src="svg/cashly-logotype.svg" alt="" />
    </div>
    <section class="aside-menu">
      <h2>Menu</h2>
      <app-menu-button label="Novo Cashflow" (clicked)="openCreateCashflowModal()"></app-menu-button>
      <app-modal
        [isOpen]="isCreateCashflowModalOpen()"
        title="Novo Cashflow"
        (closed)="closeCreateCashflowModal()">
        <app-create-cashflow-form (cashflowCreated)="onCashflowCreated()" (closeModal)="closeCreateCashflowModal()"></app-create-cashflow-form>
      </app-modal>
    </section>
  </div>
  <div class="main-container">
    <div class="dashboard-header">
      @for(cashflow of cashflows(); track cashflow.cashflowId){
        <app-cashflow-header-card [cashflow]="cashflow"></app-cashflow-header-card>
      }
    </div>
    <div class="dashboard-main"></div>
  </div>
</main>
