      <section class="cashflow-card" [class.selected]="isSelected()" (click)="selectCashflow()">
        <h2 class="cashflow-title">{{ cashflow().title }}</h2>
        <hr>
        <div class="cashflow-info">
          <p>{{ cashflow().role }}</p>
          <p>Participantes: {{ cashflow().participants }}</p>
        </div>
    </section>
